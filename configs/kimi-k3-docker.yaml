# noise-bench — add moonshotai/kimi-k3 to the leaderboard (Docker).
# Same conditions as the v2 frozen run: 1800s agent timeout, graded capture.
# OpenRouter flags this model's upstream capacity as limited (frequent 429s);
# run at n_concurrent_trials: 2 and retry rate-limited trials as infra errors.
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 2
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k3
    override_timeout_sec: 1800

datasets:
  - path: datasets/noisebench
    task_names:
      - ai-platform-alert-noise
      - cert-expiry-fanout
      - ci-e2e-test-noise
      - deploy-storm
      - disk-pressure-flapper-storm
      - escalation-loopback-noise
      - maintenance-window-masking
      - mixed-triage-heavy
      - node-event-noise
      - noisy-night-shift
      - obvious-sev1-cluster
      - queue-backlog-vs-blip
      - quiet-but-deadly
      - region-failover-mixed
      - sev1-misconfigured-rule
      - slow-burn-saturation
      - warning-spike-transients
