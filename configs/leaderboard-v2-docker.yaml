# noise-bench — leaderboard v2: full re-run, all 21 models (Docker).
#
# Replaces the 2026-06-30/07-02 frozen run. Changes vs v1 conditions:
#   - override_timeout_sec: 1800 for every agent (v1's 600s cap invalidated
#     claude-opus-4.8's row: 13 of its 20 failures were AgentTimeoutError
#     on a slow OpenRouter day)
#   - post-revision scenario data (disk-pressure-flapper-storm and
#     node-event-noise severity-inversion / latched-alert traps)
#   - graders emit per-trial graded reward (verifier/metrics.json), so the
#     leaderboard can publish mean graded reward ± 95% CI alongside pass rate
#
# Methodology note: any residual AgentTimeoutError trial should be treated as
# an infra error and re-run, not scored as a failure.
#
# Usage: set -a && source .env && set +a && harbor run -c configs/leaderboard-v2-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-fable-5
    override_timeout_sec: 1800
