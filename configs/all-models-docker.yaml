# noise-bench — all scenarios, several frontier models (Docker).
# Usage: set -a && source .env && set +a && harbor run -c configs/all-models-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.8
  - name: terminus-2
    model_name: openrouter/anthropic/claude-sonnet-4.6
  - name: terminus-2
    model_name: openrouter/anthropic/claude-haiku-4.5
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.5
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.4
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.4-mini
  - name: terminus-2
    model_name: openrouter/google/gemini-3.1-pro-preview
  - name: terminus-2
    model_name: openrouter/google/gemini-3.5-flash
  - name: terminus-2
    model_name: openrouter/google/gemini-3.1-flash-lite
  - name: terminus-2
    model_name: openrouter/openai/gpt-oss-120b
  - name: terminus-2
    model_name: openrouter/openai/gpt-oss-20b
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2-thinking

datasets:
  - path: datasets/noisebench
    task_names:
      - ai-platform-alert-noise
      - ci-e2e-test-noise
      - deploy-storm
      - disk-pressure-flapper-storm
      - escalation-loopback-noise
      - node-event-noise
      - noisy-night-shift
      - queue-backlog-vs-blip
      - quiet-but-deadly
      - warning-spike-transients
      - cert-expiry-fanout
      - maintenance-window-masking
      - mixed-triage-heavy
      - obvious-sev1-cluster
      - region-failover-mixed
      - sev1-misconfigured-rule
      - slow-burn-saturation
