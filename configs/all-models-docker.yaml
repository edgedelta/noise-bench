# PageBench — all scenarios, several frontier models (Docker).
# Usage: source .env && uv run harbor run -c configs/all-models-docker.yaml
# 10 scenarios x 4 models x 3 attempts = 120 trials.

jobs_dir: jobs
n_attempts: 3

orchestrator:
  type: local
  n_concurrent_trials: 8
  quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.6
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.2-codex
  - name: terminus-2
    model_name: openrouter/google/gemini-3-pro-preview
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5

datasets:
  - path: datasets
    task_names:
      - noisy-night-shift
      - deploy-storm
      - quiet-but-deadly
      - disk-pressure-flapper-storm
      - escalation-loopback-noise
      - ci-e2e-test-noise
      - warning-spike-transients
      - ai-platform-alert-noise
      - queue-backlog-vs-blip
      - node-event-noise
