# page-bench — all scenarios, several frontier models (Docker).
# Usage: set -a && source .env && set +a && harbor run -c configs/all-models-docker.yaml -y
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 8
quiet: false

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: openrouter/anthropic/claude-opus-4.6
  - name: terminus-2
    model_name: openrouter/openai/gpt-5.2-codex
  - name: terminus-2
    model_name: openrouter/google/gemini-2.5-pro
  - name: terminus-2
    model_name: openrouter/moonshotai/kimi-k2.5

datasets:
  - path: datasets/pagebench
    task_names:
      - ai-platform-alert-noise
      - ci-e2e-test-noise
      - deploy-storm
      - disk-pressure-flapper-storm
      - escalation-loopback-noise
      - node-event-noise
      - noisy-night-shift
      - queue-backlog-vs-blip
      - quiet-but-deadly
      - warning-spike-transients
